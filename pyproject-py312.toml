[project]
name = "multi-agent-ai-research"
version = "0.2.0"
description = "Multi-agent study & coding assistant built with LangChain and LangGraph (py3.12 branch)"
readme = "README.md"
requires-python = ">=3.12,<3.13"

# ---------------------------------------------------------------------------
# Notes on migration from py3.10:
#
# Why these versions/pins changed:
#   - langgraph:     0.2.45 -> >=0.6  (0.2.45 has no py3.12 wheel; 0.6+ API
#                    for StateGraph is backwards-compatible with our code)
#   - langchain-core: <0.4.0 -> >=0.3 (hard conflict with modern ecosystem;
#                    langchain v1.x requires langchain-core>=1, but we float
#                    to >=0.3 to match what langchain 0.3 ships with — safer
#                    than jumping to v1)
#   - langchain-together: DROPPED (stale wrapper; we hit Together via
#                    ChatOpenAI(base_url="https://api.together.xyz/v1") if
#                    needed, or call the `together` SDK directly)
#   - langchain-tavily: float 0.2.0 -> >=0.2 (same API, newer wheels)
#   - streamlit:     1.39.0 -> >=1.40 (py3.12 wheel coverage)
#   - httpx:         ==0.27.2 -> >=0.27 (float so openhands-sdk + chromadb
#                    don't collide)
#
# Why NEW packages:
#   - langchain-chroma:      Chroma was extracted out of langchain-community
#                            in 0.3.9+. memory/rag.py and memory/notes_memory.py
#                            must update their imports (see patch list).
#   - langchain-huggingface: HuggingFaceEmbeddings was also extracted. Same.
#   - openhands-sdk,
#     openhands-tools:       Condition C action agent (the whole reason we are
#                            migrating to py3.12).
# ---------------------------------------------------------------------------
dependencies = [
    # --- LangChain stack (floated, py3.12-compatible) ---
    "langchain>=0.3",
    "langchain-community>=0.3",
    "langchain-core>=0.3",
    "langchain-openai>=0.2",
    "langchain-text-splitters>=0.3",
    "langchain-tavily>=0.2",
    "langchain-chroma>=0.1",        # NEW: Chroma vectorstore moved here
    "langchain-huggingface>=0.1",   # NEW: HF embeddings moved here

    # --- LangGraph (floated for py3.12 wheels) ---
    "langgraph>=0.6",

    # --- UI + web ---
    "streamlit>=1.40",
    "fastapi",
    "uvicorn[standard]",
    "python-multipart",

    # --- RAG + embeddings ---
    "chromadb",
    "sentence-transformers",
    "pypdf",

    # --- SWE-bench Lite dataset loading ---
    "datasets>=2.14",

    # --- LLM providers (direct SDKs, no langchain wrapper) ---
    "together>=1.3",
    "tavily-python>=0.5",

    # --- Core utils ---
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "pydantic>=2.7",
    "requests",

    # --- Condition C: OpenHands action agent ---
    "openhands-sdk",
    "openhands-tools",

    # --- Dev/test ---
    "pytest>=7.0.0",
]

[tool.uv]
# Pin the resolver to prefer binary wheels over sdist to avoid slow builds
# of transitive C/Rust extensions on Windows.
prerelease = "if-necessary-or-explicit"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["memory"]
